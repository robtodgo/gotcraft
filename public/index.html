<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gotcraft v0.3.0</title>
  <style>
    @font-face { font-family: 'Minecraft'; src: url('https://db.onlinewebfonts.com/t/6ab539c6fc2b21ff0b149b3d06d7f97c.woff2') format('woff2'); }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Minecraft', monospace; image-rendering: pixelated; }
    body { background: #0d0d0d; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #app { width: 100%; max-width: 1280px; height: 100vh; display: flex; flex-direction: column; background: #1a1a1a; box-shadow: 0 0 0 4px #2d2d2d; overflow: hidden; position: relative; }
    .panel { background: #1e1e1e; border: 4px solid #3b3b3b; box-shadow: inset 0 0 0 2px #0f0f0f, 0 6px 0 #0a0a0a; padding: 20px; color: #e0e0e0; }
    button { background: #3c3c3c; border: 3px solid #1f1f1f; border-bottom: 6px solid #0f0f0f; color: white; padding: 12px 24px; font-size: 18px; cursor: pointer; text-transform: uppercase; box-shadow: inset 0 0 0 2px #5a5a5a; transition: 0.05s; margin: 8px; }
    button:hover { background: #4a7a3a; border-bottom-width: 4px; transform: translateY(2px); }
    input, select { background: #0f0f0f; border: 3px solid #2d2d2d; border-bottom: 6px solid #1a1a1a; color: white; padding: 12px; font-size: 16px; margin: 8px 0; width: 100%; }
    h1, h2 { color: #8bc34a; text-shadow: 4px 4px #1a3b0e; }
    #gameCanvas { display: block; width: 100%; height: 100%; background: #6b8cff; }
    #hud { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; color: white; text-shadow: 2px 2px #1a1a1a; font-size: 20px; }
    #hotbar { display: flex; gap: 4px; background: rgba(20,20,20,0.8); padding: 8px; border: 3px solid #2d2d2d; }
    .slot { width: 48px; height: 48px; background: #8b8b8b; border: 3px solid #2d2d2d; border-bottom: 6px solid #151515; }
    .slot.selected { border-color: #8bc34a; }
    #debugInfo { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #aaffaa; padding: 8px; border: 2px solid #3a7a2a; display: none; }
    #chatBox { position: absolute; bottom: 100px; left: 10px; width: 400px; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.6); color: white; padding: 8px; border: 3px solid #2d2d2d; font-size: 14px; pointer-events: none; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #1e1e1e; border: 6px solid #2d2d2d; box-shadow: inset 0 0 0 3px #0a0a0a, 0 10px 0 #0f0f0f; padding: 32px; max-width: 500px; width: 90%; }
  </style>
</head>
<body>
<div id="app">
  <div id="authScreen" class="modal" style="display: flex;">
    <div class="modal-content">
      <h1 style="font-size:48px;">GOTCRAFT</h1>
      <div style="margin-bottom:20px;">v0.3.0</div>
      <input type="text" id="username" placeholder="Логин">
      <input type="password" id="password" placeholder="Пароль">
      <div style="display:flex; gap:10px; justify-content:center;">
        <button id="loginBtn">Войти</button>
        <button id="registerBtn">Регистрация</button>
      </div>
      <div id="authError" style="color:#ff5555; margin-top:15px;"></div>
    </div>
  </div>
  <div id="mainMenu" style="display:none; flex-direction:column; align-items:center; justify-content:center; height:100%;">
    <h1 style="font-size:72px;">GOTCRAFT</h1>
    <button id="singleplayerBtn" style="min-width:300px;">Одиночная игра</button>
    <button id="multiplayerBtn" style="min-width:300px;">Сетевая игра</button>
    <button id="settingsBtn" style="min-width:300px;">Настройки</button>
    <div style="margin-top:30px;">Игрок: <span id="displayUsername" class="green-text"></span></div>
  </div>
  <div id="createWorldScreen" style="display:none; padding:30px; overflow-y:auto;">
    <div class="panel">
      <h2>Создание мира</h2>
      <label>Название:</label>
      <input type="text" id="worldNameInput" value="Новый мир" placeholder="&aЦвет &lЖирный">
      <label>Режим:</label>
      <select id="gameModeSelect"><option value="survival">Выживание</option><option value="creative">Креатив</option></select>
      <label>Сложность:</label>
      <select id="difficultySelect"><option value="peaceful">Мирная</option><option value="easy">Лёгкая</option><option value="normal" selected>Нормальная</option><option value="hard">Сложная</option></select>
      <label><input type="checkbox" id="cheatsCheckbox"> Читы</label>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button id="createWorldConfirm">Создать</button>
        <button id="backToMenuFromCreate">Назад</button>
      </div>
    </div>
  </div>
  <div id="multiplayerScreen" style="display:none; padding:30px;">
    <div class="panel">
      <h2>Сетевая игра</h2>
      <div id="worldsList" style="margin:20px 0; max-height:300px; overflow-y:auto;"></div>
      <button id="refreshWorlds">Обновить</button>
      <button id="backToMenuFromMulti">Назад</button>
    </div>
  </div>
  <div id="gameScreen" style="display:none; position:relative; width:100%; height:100%;">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div>❤️ <span id="healthDisplay">20</span> 🍗 <span id="hungerDisplay">20</span></div>
      <div id="hotbar"><div class="slot selected"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>
    </div>
    <div id="debugInfo"></div>
    <div id="chatBox"></div>
    <input type="text" id="chatInput" style="position:absolute; bottom:10px; left:10px; width:400px; display:none;" placeholder="Сообщение...">
    <div id="pauseMenu" class="modal-content" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:300px;">
      <h3>Пауза</h3>
      <button id="resumeBtn">Продолжить</button>
      <button id="openToLanBtn">Открыть по сети</button>
      <button id="saveAndQuitBtn">Выйти</button>
    </div>
  </div>
  <div id="settingsScreen" style="display:none; padding:30px;">
    <div class="panel">
      <h2>Настройки</h2>
      <label>Язык:</label>
      <select id="languageSelect"><option value="ru">Русский</option><option value="uk">Українська</option><option value="en">English</option></select>
      <button id="backFromSettings">Назад</button>
    </div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
  (function(){
    "use strict";
    // ---------- Форматирование &-кодов ----------
    function formatMinecraftText(text) {
      if (!text) return '';
      const map = {'0':'#000000','1':'#0000AA','2':'#00AA00','3':'#00AAAA','4':'#AA0000','5':'#AA00AA','6':'#FFAA00','7':'#AAAAAA','8':'#555555','9':'#5555FF','a':'#55FF55','b':'#55FFFF','c':'#FF5555','d':'#FF55FF','e':'#FFFF55','f':'#FFFFFF'};
      let result = '';
      let styles = { color: '#FFFFFF', bold: false, italic: false, underline: false, obfuscated: false };
      let i = 0;
      while (i < text.length) {
        if (text[i] === '&' && i+1 < text.length) {
          const code = text[i+1].toLowerCase();
          if (code === 'r') { styles = { color: '#FFFFFF', bold: false, italic: false, underline: false, obfuscated: false }; }
          else if (code === 'l') styles.bold = true;
          else if (code === 'o') styles.italic = true;
          else if (code === 'n') styles.underline = true;
          else if (code === 'm') styles.strikethrough = true;
          else if (code === 'k') styles.obfuscated = true;
          else if (map[code]) styles.color = map[code];
          i += 2;
        } else {
          let span = document.createElement('span');
          span.style.color = styles.color;
          if (styles.bold) span.style.fontWeight = 'bold';
          if (styles.italic) span.style.fontStyle = 'italic';
          if (styles.underline) span.style.textDecoration = 'underline';
          if (styles.obfuscated) span.style.textDecoration = 'line-through';
          span.textContent = text[i];
          result += span.outerHTML;
          i++;
        }
      }
      return result;
    }

    // Глобальные переменные
    let socket, currentUser, currentWorld, players = {}, worldBlocks = {}, chatMessages = [];
    let canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    let keys = {};
    let player = { x: 0, y: 70, vx: 0, vy: 0, onGround: false, health: 20, hunger: 20, gamemode: 'survival' };
    let showDebug = false, paused = false, chatOpen = false;
    const tileSize = 32;
    let cameraX = 0, cameraY = 0;

    // UI элементы
    const authScreen = document.getElementById('authScreen'), mainMenu = document.getElementById('mainMenu');
    const createWorldScreen = document.getElementById('createWorldScreen'), multiplayerScreen = document.getElementById('multiplayerScreen');
    const gameScreen = document.getElementById('gameScreen'), pauseMenu = document.getElementById('pauseMenu');
    const chatBox = document.getElementById('chatBox'), chatInput = document.getElementById('chatInput'), debugInfo = document.getElementById('debugInfo');
    const authError = document.getElementById('authError');

    function showError(msg) { authError.innerHTML = msg; setTimeout(() => authError.innerHTML = '', 3000); }
    function addChatMessage(msg) {
      chatMessages.push(msg);
      if (chatMessages.length > 20) chatMessages.shift();
      chatBox.innerHTML = chatMessages.map(m => `<span style="color:#8bc34a">${m.username}:</span> ${formatMinecraftText(m.message)}`).join('<br>');
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Socket
    function connectSocket() {
      socket = io();
      socket.on('auth_success', ({ username }) => { currentUser = username; document.getElementById('displayUsername').textContent = username; showMainMenu(); });
      socket.on('auth_error', showError);
      socket.on('worlds_list', list => {
        const div = document.getElementById('worldsList');
        div.innerHTML = list.map(w => `<div style="padding:10px;border:2px solid #3a3a3a;margin:5px;cursor:pointer;" onclick="socket.emit('join_world',{worldId:'${w.id}'})"><strong>${formatMinecraftText(w.name)}</strong> (${w.players}) ${w.settings.gameMode}</div>`).join('');
      });
      socket.on('world_created', data => startGame(data));
      socket.on('world_data', data => {
        worldBlocks = data.blocks;
        players = data.players;
        currentWorld = { worldId: data.worldId, worldName: data.worldName, settings: data.settings };
        player.gamemode = data.settings.gameMode;
        player.x = players[socket.id]?.x || 0;
        player.y = players[socket.id]?.y || 70;
        chatMessages = data.chatMessages || [];
        chatBox.innerHTML = chatMessages.map(m => `<span style="color:#8bc34a">${m.username}:</span> ${formatMinecraftText(m.message)}`).join('<br>');
        showGameScreen();
      });
      socket.on('player_joined', p => { players[p.id] = p; addChatMessage({username:'Server', message:`${p.username} зашёл`}); });
      socket.on('player_left', p => { delete players[p.id]; addChatMessage({username:'Server', message:`${p.username} вышел`}); });
      socket.on('player_moved', ({ id, x, y }) => { if (players[id]) { players[id].x = x; players[id].y = y; } });
      socket.on('block_update', ({ x, y, type }) => { const key = `${x},${y}`; if (type === null) delete worldBlocks[key]; else worldBlocks[key] = type; });
      socket.on('chat_message', addChatMessage);
    }

    function showMainMenu() {
      authScreen.style.display = 'none'; mainMenu.style.display = 'flex';
      createWorldScreen.style.display = 'none'; multiplayerScreen.style.display = 'none'; gameScreen.style.display = 'none';
    }
    function startGame(data) { /* ... вызов join_world или world_created приводит к world_data */ }
    function showGameScreen() {
      mainMenu.style.display = 'none'; gameScreen.style.display = 'block'; pauseMenu.style.display = 'none';
      resizeCanvas(); requestAnimationFrame(gameLoop);
    }
    function resizeCanvas() { canvas.width = gameScreen.clientWidth; canvas.height = gameScreen.clientHeight; }

    // Физика и управление
    function updatePlayer() {
      if (paused) return;
      const speed = 0.2, jumpForce = -5.5;
      if (keys['KeyA']) player.vx = -speed;
      else if (keys['KeyD']) player.vx = speed;
      else player.vx *= 0.7;
      if (keys['Space'] && player.onGround) player.vy = jumpForce;
      player.vy += 0.3; player.y += player.vy;
      player.x += player.vx;
      // Коллизия
      const footX = Math.floor(player.x), footY = Math.floor(player.y + 0.9);
      player.onGround = !!worldBlocks[`${footX},${footY+1}`];
      if (player.onGround && player.vy > 0) { player.y = footY; player.vy = 0; }
      // Отправка на сервер
      socket.emit('player_update', { x: player.x, y: player.y, health: player.health, hunger: player.hunger });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const camX = player.x * tileSize - canvas.width/2;
      const camY = player.y * tileSize - canvas.height/2;
      // Блоки
      for (let key in worldBlocks) {
        const [x, y] = key.split(',').map(Number);
        const sx = x * tileSize - camX, sy = y * tileSize - camY;
        ctx.fillStyle = worldBlocks[key] === 'grass' ? '#7c9c3e' : worldBlocks[key] === 'dirt' ? '#8b5e3c' : '#6a6a6a';
        ctx.fillRect(sx, sy, tileSize, tileSize);
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2; ctx.strokeRect(sx, sy, tileSize, tileSize);
      }
      // Игроки
      for (let id in players) {
        const p = players[id];
        const sx = p.x * tileSize - camX, sy = p.y * tileSize - camY;
        ctx.fillStyle = id === socket.id ? '#ff4a4a' : '#4a7aff';
        ctx.fillRect(sx, sy, tileSize, tileSize);
        ctx.fillStyle = 'white'; ctx.font = '14px Minecraft'; ctx.fillText(p.username, sx, sy-5);
      }
      document.getElementById('healthDisplay').textContent = player.health;
      document.getElementById('hungerDisplay').textContent = player.hunger;
      if (showDebug) { debugInfo.style.display = 'block'; debugInfo.textContent = `XYZ: ${player.x.toFixed(1)} ${player.y.toFixed(1)} | ${currentWorld?.worldName}`; }
      else debugInfo.style.display = 'none';
    }

    function gameLoop() { updatePlayer(); draw(); requestAnimationFrame(gameLoop); }

    // События
    window.addEventListener('keydown', e => {
      if (e.code === 'F3') { showDebug = !showDebug; e.preventDefault(); }
      if (e.code === 'Escape' && currentWorld) { paused = !paused; pauseMenu.style.display = paused ? 'block' : 'none'; e.preventDefault(); }
      if (e.code === 'KeyT' && currentWorld && !paused) { chatOpen = true; chatInput.style.display = 'block'; chatInput.focus(); e.preventDefault(); }
      if (e.code === 'Enter' && chatOpen) {
        if (chatInput.value.trim()) socket.emit('chat_message', { message: chatInput.value });
        chatInput.value = ''; chatInput.style.display = 'none'; chatOpen = false; e.preventDefault();
      }
      keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('mousedown', e => {
      if (!currentWorld || paused) return;
      const rect = canvas.getBoundingClientRect();
      const camX = player.x * tileSize - canvas.width/2;
      const camY = player.y * tileSize - canvas.height/2;
      const wx = Math.floor((e.clientX - rect.left + camX) / tileSize);
      const wy = Math.floor((e.clientY - rect.top + camY) / tileSize);
      if (e.button === 0) socket.emit('block_action', { x: wx, y: wy, action: 'break' });
      else if (e.button === 2) socket.emit('block_action', { x: wx, y: wy, action: 'place', blockType: 'stone' });
    });
    window.addEventListener('contextmenu', e => e.preventDefault());

    // Кнопки
    document.getElementById('loginBtn').onclick = () => {
      const u = document.getElementById('username').value, p = document.getElementById('password').value;
      fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) })
        .then(r=>r.json()).then(d=>{ if(d.success) socket.emit('auth',{username:u}); else showError(d.error); });
    };
    document.getElementById('registerBtn').onclick = () => {
      const u = document.getElementById('username').value, p = document.getElementById('password').value;
      fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) })
        .then(r=>r.json()).then(d=>{ if(d.success) showError('Успешно! Теперь войдите.'); else showError(d.error); });
    };
    document.getElementById('singleplayerBtn').onclick = () => { mainMenu.style.display = 'none'; createWorldScreen.style.display = 'block'; };
    document.getElementById('multiplayerBtn').onclick = () => { mainMenu.style.display = 'none'; multiplayerScreen.style.display = 'block'; socket.emit('get_worlds'); };
    document.getElementById('backToMenuFromCreate').onclick = showMainMenu;
    document.getElementById('backToMenuFromMulti').onclick = showMainMenu;
    document.getElementById('refreshWorlds').onclick = () => socket.emit('get_worlds');
    document.getElementById('createWorldConfirm').onclick = () => {
      const name = document.getElementById('worldNameInput').value || 'Мир';
      const settings = { gameMode: document.getElementById('gameModeSelect').value, difficulty: document.getElementById('difficultySelect').value, cheats: document.getElementById('cheatsCheckbox').checked };
      socket.emit('create_world', { name, settings });
    };
    document.getElementById('resumeBtn').onclick = () => { paused = false; pauseMenu.style.display = 'none'; };
    document.getElementById('saveAndQuitBtn').onclick = () => { location.reload(); };
    document.getElementById('openToLanBtn').onclick = () => alert('Мир уже открыт по сети!');
    document.getElementById('backFromSettings').onclick = showMainMenu;
    document.getElementById('settingsBtn').onclick = () => { mainMenu.style.display = 'none'; settingsScreen.style.display = 'block'; };
    window.onload = connectSocket;
  })();
</script>
</body>
</html>
