<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gotcraft v1.2.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    body {
      background: #0a0f0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #app {
      width: 100%;
      max-width: 1280px;
      height: 100vh;
      background: #1a1e1a;
      box-shadow: 0 0 0 4px #2a3a2a, inset 0 0 0 2px #0f1a0f;
      position: relative;
      overflow: hidden;
    }
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 20, 10, 0.95);
      z-index: 20;
      padding: 20px;
    }
    button {
      font-family: 'Press Start 2P';
      padding: 16px 32px;
      margin: 10px;
      background: #1e3a1e;
      color: #e0ffe0;
      border: 4px solid #2a5a2a;
      border-bottom: 8px solid #0f2a0f;
      cursor: pointer;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: inset 0 0 0 2px #3a6a3a;
      transition: 0.05s linear;
    }
    button:hover {
      background: #2a5a2a;
      border-bottom-width: 6px;
      transform: translateY(2px);
    }
    button:active {
      border-bottom-width: 4px;
      transform: translateY(4px);
    }
    input, select {
      background: #0f1a0f;
      border: 3px solid #2a4a2a;
      border-bottom: 6px solid #0f2a0f;
      color: #e0ffe0;
      padding: 14px;
      font-size: 14px;
      font-family: 'Press Start 2P';
      margin: 12px 0;
      width: 100%;
      max-width: 400px;
    }
    h1, h2, h3 {
      color: #5fdf5f;
      text-shadow: 4px 4px #0f3a0f;
      letter-spacing: 4px;
    }
    #version {
      position: absolute;
      bottom: 15px;
      right: 20px;
      color: #3a6a3a;
      font-size: 12px;
      z-index: 100;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #6b9cff;
    }
    #hud {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      color: white;
      text-shadow: 3px 3px #1a1a1a;
      font-size: 18px;
      z-index: 15;
    }
    #hotbar {
      display: flex;
      gap: 6px;
      background: rgba(20,30,20,0.9);
      padding: 10px;
      border: 4px solid #2a4a2a;
      border-bottom: 8px solid #0f2a0f;
      pointer-events: auto;
    }
    .slot {
      width: 56px;
      height: 56px;
      background-size: cover;
      border: 3px solid #3a6a3a;
      border-bottom: 6px solid #1a3a1a;
      image-rendering: pixelated;
      cursor: pointer;
    }
    .slot.selected {
      border-color: #9fdf9f;
      box-shadow: inset 0 0 0 3px #5fbf5f, 0 0 15px #5fbf5f;
    }
    #debugInfo {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: #aaffaa;
      padding: 10px;
      font-size: 12px;
      border: 2px solid #3a8a3a;
      display: none;
      z-index: 16;
    }
    #chatBox {
      position: absolute;
      bottom: 120px;
      left: 20px;
      width: 400px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      border: 3px solid #2a4a2a;
      font-size: 12px;
      pointer-events: none;
      z-index: 16;
    }
    #chatInput {
      position: absolute;
      bottom: 120px;
      left: 20px;
      width: 400px;
      display: none;
      z-index: 17;
    }
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #5fdf5f;
      font-size: 24px;
      z-index: 30;
    }
    .modal-content {
      background: #1e2a1e;
      border: 6px solid #2a4a2a;
      box-shadow: inset 0 0 0 3px #0f1a0f, 0 10px 0 #0a1a0a;
      padding: 32px;
      max-width: 500px;
      width: 90%;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Версия (всегда на виду) -->
  <div id="version">GOTCRAFT v1.2.0</div>

  <!-- Экран входа/регистрации -->
  <div id="authScreen" class="screen" style="display: flex;">
    <div class="modal-content">
      <h1 style="font-size:48px; text-align:center;">GOTCRAFT</h1>
      <input type="text" id="username" placeholder="Логин" autocomplete="off">
      <input type="password" id="password" placeholder="Пароль">
      <div style="display:flex; gap:10px; justify-content:center;">
        <button id="loginBtn">Войти</button>
        <button id="registerBtn">Регистрация</button>
      </div>
      <div id="authError" style="color:#ff7f7f; margin-top:15px; text-align:center;"></div>
    </div>
  </div>

  <!-- Главное меню -->
  <div id="mainMenu" class="screen" style="display:none;">
    <h1 style="font-size:64px;">GOTCRAFT</h1>
    <div style="margin:20px 0 40px; color:#8fbf8f;">Выживай, строй, исследуй</div>
    <button id="singleplayerBtn">Одиночная игра</button>
    <button id="multiplayerBtn">Сетевая игра</button>
    <button id="settingsBtn">Настройки</button>
    <div style="margin-top:40px;">Игрок: <span id="displayUsername" style="color:#5fdf5f;"></span></div>
  </div>

  <!-- Создание мира -->
  <div id="createWorldScreen" class="screen" style="display:none;">
    <div class="modal-content">
      <h2>Создать мир</h2>
      <label>Название:</label>
      <input type="text" id="worldNameInput" value="Новый мир" placeholder="&aЦвет &lЖирный">
      <label>Режим:</label>
      <select id="gameModeSelect">
        <option value="survival">Выживание</option>
        <option value="creative">Креатив</option>
      </select>
      <label>Сложность:</label>
      <select id="difficultySelect">
        <option value="peaceful">Мирная</option>
        <option value="easy">Лёгкая</option>
        <option value="normal" selected>Нормальная</option>
        <option value="hard">Сложная</option>
      </select>
      <label><input type="checkbox" id="cheatsCheckbox"> Читы (команды)</label>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button id="createWorldConfirm">Создать</button>
        <button id="backToMenuFromCreate">Назад</button>
      </div>
    </div>
  </div>

  <!-- Сетевая игра -->
  <div id="multiplayerScreen" class="screen" style="display:none;">
    <div class="modal-content">
      <h2>Сетевая игра</h2>
      <div id="worldsList" style="margin:20px 0; max-height:300px; overflow-y:auto;"></div>
      <button id="refreshWorlds">Обновить</button>
      <button id="backToMenuFromMulti">Назад</button>
    </div>
  </div>

  <!-- Игровой экран -->
  <div id="gameScreen" style="display:none; position:relative; width:100%; height:100%;">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div>❤️ <span id="healthDisplay">20</span>  🍗 <span id="hungerDisplay">20</span></div>
      <div id="hotbar"></div>
    </div>
    <div id="debugInfo"></div>
    <div id="chatBox"></div>
    <input type="text" id="chatInput" placeholder="Сообщение..." autocomplete="off">
    <div id="loading">
      <div>Загрузка мира...</div>
      <div style="margin-top:20px; font-size:16px;">Генерация ландшафта</div>
    </div>
    <!-- Меню паузы -->
    <div id="pauseMenu" class="modal-content" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:25;">
      <h3>Пауза</h3>
      <button id="resumeBtn">Продолжить</button>
      <button id="openToLanBtn">Открыть по сети</button>
      <button id="saveAndQuitBtn">Выйти в меню</button>
    </div>
  </div>

  <!-- Настройки -->
  <div id="settingsScreen" class="screen" style="display:none;">
    <div class="modal-content">
      <h2>Настройки</h2>
      <label>Язык:</label>
      <select id="languageSelect">
        <option value="ru">Русский</option>
        <option value="uk">Українська</option>
        <option value="en">English</option>
      </select>
      <button id="backFromSettings">Назад</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  (function(){
    "use strict";

    // ---------- Форматирование &-кодов (как § в Minecraft) ----------
    function formatMinecraftText(text) {
      if (!text) return '';
      const colorMap = {
        '0':'#000000','1':'#0000AA','2':'#00AA00','3':'#00AAAA','4':'#AA0000',
        '5':'#AA00AA','6':'#FFAA00','7':'#AAAAAA','8':'#555555','9':'#5555FF',
        'a':'#55FF55','b':'#55FFFF','c':'#FF5555','d':'#FF55FF','e':'#FFFF55','f':'#FFFFFF'
      };
      let result = '';
      let styles = { color: '#FFFFFF', bold: false, italic: false, underline: false, obfuscated: false };
      let i = 0;
      while (i < text.length) {
        if (text[i] === '&' && i+1 < text.length) {
          const code = text[i+1].toLowerCase();
          if (code === 'r') styles = { color: '#FFFFFF', bold: false, italic: false, underline: false, obfuscated: false };
          else if (code === 'l') styles.bold = true;
          else if (code === 'o') styles.italic = true;
          else if (code === 'n') styles.underline = true;
          else if (code === 'm') styles.strikethrough = true;
          else if (code === 'k') styles.obfuscated = true;
          else if (colorMap[code]) styles.color = colorMap[code];
          i += 2;
        } else {
          let span = document.createElement('span');
          span.style.color = styles.color;
          if (styles.bold) span.style.fontWeight = 'bold';
          if (styles.italic) span.style.fontStyle = 'italic';
          if (styles.underline) span.style.textDecoration = 'underline';
          if (styles.obfuscated) span.style.textDecoration = 'line-through';
          span.textContent = text[i];
          result += span.outerHTML;
          i++;
        }
      }
      return result;
    }

    // Глобальные переменные
    let socket;
    let currentUser = null;
    let currentWorld = null;
    let players = {};
    let worldBlocks = {};
    let chatMessages = [];
    let canvas, ctx;
    let keys = {};
    let player = { x: 0, y: 70, vx: 0, vy: 0, onGround: false, health: 20, hunger: 20, gamemode: 'survival' };
    let showDebug = false, paused = false, chatOpen = false;
    const tileSize = 40;
    let selectedBlock = 'stone';
    const blockTextures = {
      grass: '#7c9c3e',
      dirt: '#8b5e3c',
      stone: '#8a8a8a'
    };

    // DOM элементы
    const authScreen = document.getElementById('authScreen');
    const mainMenu = document.getElementById('mainMenu');
    const createWorldScreen = document.getElementById('createWorldScreen');
    const multiplayerScreen = document.getElementById('multiplayerScreen');
    const gameScreen = document.getElementById('gameScreen');
    const pauseMenu = document.getElementById('pauseMenu');
    const loadingDiv = document.getElementById('loading');
    const chatBox = document.getElementById('chatBox');
    const chatInput = document.getElementById('chatInput');
    const debugInfo = document.getElementById('debugInfo');
    const authError = document.getElementById('authError');
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');

    function showError(msg) {
      authError.innerHTML = msg;
      setTimeout(() => authError.innerHTML = '', 3000);
    }

    function addChatMessage(msg) {
      chatMessages.push(msg);
      if (chatMessages.length > 20) chatMessages.shift();
      chatBox.innerHTML = chatMessages.map(m => 
        `<span style="color:#8bc34a">${m.username}:</span> ${formatMinecraftText(m.message)}`
      ).join('<br>');
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Socket.IO
    function connectSocket() {
      socket = io();
      socket.on('connect', () => console.log('Socket connected'));
      socket.on('auth_success', ({ username }) => {
        currentUser = username;
        document.getElementById('displayUsername').textContent = username;
        showMainMenu();
      });
      socket.on('auth_error', (msg) => showError(msg));
      socket.on('worlds_list', list => {
        const container = document.getElementById('worldsList');
        if (list.length === 0) {
          container.innerHTML = '<p style="color:#aaa;">Нет открытых миров.<br>Создайте новый в одиночной игре.</p>';
          return;
        }
        container.innerHTML = list.map(w => `
          <div style="padding:12px; border:2px solid #2a4a2a; margin:6px; cursor:pointer; background:#1a2a1a;"
               onclick="socket.emit('join_world', {worldId: '${w.id}'})">
            <strong>${formatMinecraftText(w.name)}</strong> (${w.players} игроков) [${w.settings.gameMode}]
          </div>
        `).join('');
      });
      socket.on('world_created', (data) => {
        currentWorld = data;
        showGameScreen();
        loadingDiv.style.display = 'flex';
        socket.emit('join_world', { worldId: data.worldId });
      });
      socket.on('world_data', (data) => {
        worldBlocks = data.blocks;
        players = data.players;
        currentWorld = { worldId: data.worldId, worldName: data.worldName, settings: data.settings };
        player.gamemode = data.settings.gameMode;
        const myData = players[socket.id];
        if (myData) { player.x = myData.x; player.y = myData.y; }
        else { player.x = 0; player.y = 70; }
        chatMessages = data.chatMessages || [];
        chatBox.innerHTML = chatMessages.map(m => 
          `<span style="color:#8bc34a">${m.username}:</span> ${formatMinecraftText(m.message)}`
        ).join('<br>');
        loadingDiv.style.display = 'none';
        createHotbar();
        startGameLoop();
      });
      socket.on('player_joined', (p) => {
        players[p.id] = p;
        addChatMessage({username:'Server', message:`${p.username} присоединился`});
      });
      socket.on('player_left', (p) => {
        delete players[p.id];
        addChatMessage({username:'Server', message:`${p.username} вышел`});
      });
      socket.on('player_moved', ({ id, x, y }) => {
        if (players[id]) { players[id].x = x; players[id].y = y; }
      });
      socket.on('block_update', ({ x, y, type }) => {
        const key = `${x},${y}`;
        if (type === null) delete worldBlocks[key];
        else worldBlocks[key] = type;
      });
      socket.on('chat_message', (msg) => addChatMessage(msg));
    }

    function showMainMenu() {
      authScreen.style.display = 'none';
      mainMenu.style.display = 'flex';
      createWorldScreen.style.display = 'none';
      multiplayerScreen.style.display = 'none';
      gameScreen.style.display = 'none';
    }

    function showGameScreen() {
      mainMenu.style.display = 'none';
      createWorldScreen.style.display = 'none';
      multiplayerScreen.style.display = 'none';
      gameScreen.style.display = 'block';
      pauseMenu.style.display = 'none';
      chatInput.style.display = 'none';
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
      canvas.width = gameScreen.clientWidth;
      canvas.height = gameScreen.clientHeight;
    }

    function createHotbar() {
      const hb = document.getElementById('hotbar');
      hb.innerHTML = '';
      const blocks = ['grass', 'dirt', 'stone'];
      blocks.forEach((type, i) => {
        const slot = document.createElement('div');
        slot.className = `slot ${i === 0 ? 'selected' : ''}`;
        slot.style.backgroundColor = blockTextures[type];
        slot.onclick = () => {
          selectedBlock = type;
          document.querySelectorAll('.slot').forEach((s, idx) => s.classList.toggle('selected', idx === i));
        };
        hb.appendChild(slot);
      });
      selectedBlock = 'grass';
    }

    // Физика
    function updatePlayer() {
      if (paused) return;
      const speed = 0.25, jumpForce = -6;
      if (keys['KeyA']) player.vx = -speed;
      else if (keys['KeyD']) player.vx = speed;
      else player.vx *= 0.7;
      if (keys['Space'] && player.onGround) player.vy = jumpForce;
      player.vy += 0.35;
      player.y += player.vy;
      player.x += player.vx;

      // Коллизия с блоками
      const footX = Math.floor(player.x);
      const footY = Math.floor(player.y + 0.9);
      player.onGround = !!worldBlocks[`${footX},${footY+1}`];
      if (player.onGround && player.vy > 0) {
        player.y = footY;
        player.vy = 0;
      }
      // Границы мира
      if (player.y > 200) { player.y = 70; player.vy = 0; } // падение в бездну

      socket.emit('player_update', { x: player.x, y: player.y, health: player.health, hunger: player.hunger });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const camX = player.x * tileSize - canvas.width/2;
      const camY = player.y * tileSize - canvas.height/2;

      // Блоки
      for (let key in worldBlocks) {
        const [x, y] = key.split(',').map(Number);
        const sx = x * tileSize - camX;
        const sy = y * tileSize - camY;
        ctx.fillStyle = blockTextures[worldBlocks[key]] || '#6a6a6a';
        ctx.fillRect(sx, sy, tileSize, tileSize);
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx, sy, tileSize, tileSize);
      }

      // Игроки
      for (let id in players) {
        const p = players[id];
        const sx = p.x * tileSize - camX;
        const sy = p.y * tileSize - camY;
        ctx.fillStyle = id === socket.id ? '#ff6a6a' : '#6a8aff';
        ctx.fillRect(sx, sy, tileSize, tileSize);
        ctx.fillStyle = 'white';
        ctx.font = '14px "Press Start 2P"';
        ctx.fillText(p.username, sx, sy-8);
      }

      // HUD
      document.getElementById('healthDisplay').textContent = player.health;
      document.getElementById('hungerDisplay').textContent = player.hunger;
      if (showDebug) {
        debugInfo.style.display = 'block';
        debugInfo.textContent = `XYZ: ${player.x.toFixed(1)} ${player.y.toFixed(1)} | ${currentWorld?.worldName}`;
      } else debugInfo.style.display = 'none';
    }

    function gameLoop() {
      if (gameScreen.style.display === 'block' && !paused) {
        updatePlayer();
        draw();
      }
      requestAnimationFrame(gameLoop);
    }

    function startGameLoop() {
      requestAnimationFrame(gameLoop);
    }

    // Управление
    window.addEventListener('keydown', (e) => {
      if (e.code === 'F3') { showDebug = !showDebug; e.preventDefault(); }
      if (e.code === 'Escape' && currentWorld) {
        paused = !paused;
        pauseMenu.style.display = paused ? 'block' : 'none';
        e.preventDefault();
      }
      if (e.code === 'KeyT' && currentWorld && !paused) {
        chatOpen = true;
        chatInput.style.display = 'block';
        chatInput.focus();
        e.preventDefault();
      }
      if (e.code === 'Enter' && chatOpen) {
        const msg = chatInput.value.trim();
        if (msg) socket.emit('chat_message', { message: msg });
        chatInput.value = '';
        chatInput.style.display = 'none';
        chatOpen = false;
        e.preventDefault();
      }
      keys[e.code] = true;
    });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    canvas.addEventListener('mousedown', (e) => {
      if (!currentWorld || paused) return;
      const rect = canvas.getBoundingClientRect();
      const camX = player.x * tileSize - canvas.width/2;
      const camY = player.y * tileSize - canvas.height/2;
      const wx = Math.floor((e.clientX - rect.left + camX) / tileSize);
      const wy = Math.floor((e.clientY - rect.top + camY) / tileSize);
      if (e.button === 0) socket.emit('block_action', { x: wx, y: wy, action: 'break' });
      else if (e.button === 2) socket.emit('block_action', { x: wx, y: wy, action: 'place', blockType: selectedBlock });
    });
    window.addEventListener('contextmenu', (e) => e.preventDefault());

    // Кнопки
    document.getElementById('loginBtn').onclick = () => {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (!u || !p) return showError('Введите логин и пароль');
      fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) })
        .then(r => r.json())
        .then(d => { if (d.success) socket.emit('auth', { username: u }); else showError(d.error); })
        .catch(() => showError('Ошибка соединения'));
    };
    document.getElementById('registerBtn').onclick = () => {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (!u || !p) return showError('Введите логин и пароль');
      fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) })
        .then(r => r.json())
        .then(d => { if (d.success) showError('Регистрация успешна! Теперь войдите.'); else showError(d.error); })
        .catch(() => showError('Ошибка соединения'));
    };
    document.getElementById('singleplayerBtn').onclick = () => {
      mainMenu.style.display = 'none';
      createWorldScreen.style.display = 'flex';
    };
    document.getElementById('multiplayerBtn').onclick = () => {
      mainMenu.style.display = 'none';
      multiplayerScreen.style.display = 'flex';
      socket.emit('get_worlds');
    };
    document.getElementById('settingsBtn').onclick = () => {
      mainMenu.style.display = 'none';
      settingsScreen.style.display = 'flex';
    };
    document.getElementById('backFromSettings').onclick = showMainMenu;
    document.getElementById('backToMenuFromCreate').onclick = showMainMenu;
    document.getElementById('backToMenuFromMulti').onclick = showMainMenu;
    document.getElementById('refreshWorlds').onclick = () => socket.emit('get_worlds');
    document.getElementById('createWorldConfirm').onclick = () => {
      const name = document.getElementById('worldNameInput').value || 'Мир';
      const settings = {
        gameMode: document.getElementById('gameModeSelect').value,
        difficulty: document.getElementById('difficultySelect').value,
        cheats: document.getElementById('cheatsCheckbox').checked
      };
      socket.emit('create_world', { name, settings });
    };
    document.getElementById('resumeBtn').onclick = () => {
      paused = false;
      pauseMenu.style.display = 'none';
    };
    document.getElementById('saveAndQuitBtn').onclick = () => {
      paused = false;
      currentWorld = null;
      gameScreen.style.display = 'none';
      showMainMenu();
    };
    document.getElementById('openToLanBtn').onclick = () => {
      alert('Мир уже открыт по сети! Другие игроки могут подключиться через "Сетевая игра".');
    };

    // Запуск
    connectSocket();
  })();
</script>
</body>
</html>
