<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gotcraft</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { margin:0; overflow:hidden; font-family:'Press Start 2P', system-ui; background:#000; color:#fff; }
    button { font-family:'Press Start 2P'; padding:12px 24px; background:#222; color:#fff; border:4px solid #555; cursor:pointer; margin:8px; }
    button:hover { background:#444; }
    .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); }
    canvas { display:block; }
    #hotbar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:4px; background:rgba(0,0,0,0.6); padding:8px; border:4px solid #555; }
    .slot { width:64px; height:64px; border:3px solid #888; background-size:cover; image-rendering:pixelated; }
    .slot.selected { border:3px solid #fff; box-shadow:0 0 15px #fff; }
    #hand { position:absolute; bottom:80px; right:80px; width:180px; height:180px; background:url('https://i.imgur.com/0Z8Z8Z8.png') no-repeat; background-size:contain; pointer-events:none; opacity:0.9; transform:rotate(-25deg); } /* простая рука */
    #inventory { position:absolute; inset:0; background:rgba(0,0,0,0.85); display:none; flex-direction:column; align-items:center; justify-content:center; }
    .inv-slot { width:64px; height:64px; border:2px solid #fff; margin:4px; background-size:cover; image-rendering:pixelated; }
  </style>
</head>
<body>
  <!-- Экраны логин/меню/создание мира — оставлены почти без изменений, только добавлен вызов списка миров -->

  <div id="menu-screen" class="screen" style="display:none">
    <h1 style="font-size:64px;color:#00ff00">GOTCRAFT</h1>
    <button onclick="showSingleplayer()" style="font-size:24px">ОДИНОЧНАЯ ИГРА</button>
    <button onclick="showMultiplayer()" style="font-size:24px">СЕТЕВАЯ ИГРА</button>
  </div>

  <!-- Список миров -->
  <div id="world-list-screen" class="screen" style="display:none">
    <h2>Открытые миры</h2>
    <div id="world-list"></div>
    <button onclick="backToMenu()">Назад</button>
  </div>

  <!-- Игра -->
  <div id="game-screen" style="display:none">
    <canvas id="canvas"></canvas>
    <div id="hotbar"></div>
    <div id="hand"></div>
    <div id="inventory">
      <h2>Инвентарь (нажми E для закрытия)</h2>
      <div style="display:flex;flex-wrap:wrap;width:600px;justify-content:center" id="inv-slots"></div>
    </div>
  </div>

  <script>
    let socket = io();
    let currentUser, currentWorldId, isFlying = false, lastSpaceTime = 0;
    let scene, camera, renderer, playerHeight = 1.8;
    let blocks = {};
    let selectedBlockType = 'grass';
    const blockTypes = ['grass', 'dirt', 'stone'];
    let hotbarSelection = 0;

    // Текстуры Minecraft (публичные ссылки)
    const textures = {
      grass: 'https://i.imgur.com/5n8n8n8.png',   // замени на реальные если найдешь лучше
      dirt: 'https://i.imgur.com/9k9k9k9.png',
      stone: 'https://i.imgur.com/2m2m2m2.png'
    };

    // Создаём хотбар
    function createHotbar() {
      const hb = document.getElementById('hotbar');
      hb.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const slot = document.createElement('div');
        slot.className = `slot ${i===0 ? 'selected' : ''}`;
        slot.style.backgroundImage = `url(${textures[blockTypes[i % 3]]})`;
        slot.onclick = () => selectHotbar(i);
        hb.appendChild(slot);
      }
    }

    function selectHotbar(index) {
      hotbarSelection = index;
      selectedBlockType = blockTypes[index % 3];
      document.querySelectorAll('.slot').forEach((s,i) => s.classList.toggle('selected', i===index));
    }

    // Простая рука
    function updateHand() {
      const hand = document.getElementById('hand');
      hand.style.transform = `rotate(${-25 + Math.sin(Date.now()/200)*5}deg)`;
    }

    // Коллизия (простая)
    function getBlockAt(x, y, z) {
      const key = `${Math.floor(x)}_${Math.floor(y)}_${Math.floor(z)}`;
      return blocks[key];
    }

    function checkCollision(newPos) {
      const feetY = Math.floor(newPos.y);
      const headY = Math.floor(newPos.y + playerHeight);
      for (let dx = -0.4; dx <= 0.4; dx += 0.8) {
        for (let dz = -0.4; dz <= 0.4; dz += 0.8) {
          if (getBlockAt(newPos.x + dx, feetY, newPos.z + dz) || 
              getBlockAt(newPos.x + dx, headY, newPos.z + dz)) {
            return true;
          }
        }
      }
      return false;
    }

    // Рендер блоков с текстурами
    function renderAllBlocks() {
      scene.children = scene.children.filter(c => !c.userData.isBlock);
      Object.keys(blocks).forEach(key => {
        const [x,y,z] = key.split('_').map(Number);
        const type = blocks[key];
        const geometry = new THREE.BoxGeometry(1,1,1);
        const material = new THREE.MeshLambertMaterial({ 
          map: new THREE.TextureLoader().load(textures[type] || 'https://i.imgur.com/5n8n8n8.png')
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, y, z);
        mesh.userData.isBlock = true;
        scene.add(mesh);
      });
    }

    // Движение с коллизией и двойным пробелом
    let keys = {};
    let velocityY = 0;

    function updateMovement() {
      const speed = 0.25;
      const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
      forward.y = 0; forward.normalize();
      const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
      right.y = 0; right.normalize();

      let newPos = camera.position.clone();

      if (keys['w']) newPos.addScaledVector(forward, speed);
      if (keys['s']) newPos.addScaledVector(forward, -speed);
      if (keys['a']) newPos.addScaledVector(right, -speed);
      if (keys['d']) newPos.addScaledVector(right, speed);

      // Вертикаль
      if (isFlying) {
        if (keys[' ']) newPos.y += speed * 1.5;
        if (keys['shift']) newPos.y -= speed * 1.5;
        velocityY = 0;
      } else {
        velocityY -= 0.025; // гравитация
        newPos.y += velocityY;
      }

      // Коллизия
      if (!checkCollision(newPos)) {
        camera.position.copy(newPos);
      } else if (!isFlying) {
        velocityY = 0; // приземление
        // корректируем позицию вверх до тех пор, пока не встанем на блок
        while (checkCollision(camera.position)) camera.position.y += 0.05;
      }
    }

    // Двойной пробел для полёта
    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === ' ') {
        const now = Date.now();
        if (now - lastSpaceTime < 300) {
          isFlying = !isFlying;
          velocityY = 0;
        }
        lastSpaceTime = now;
      }

      if (e.key === 'e' && document.getElementById('game-screen').style.display === 'block') {
        const inv = document.getElementById('inventory');
        inv.style.display = inv.style.display === 'flex' ? 'none' : 'flex';
      }

      if (e.key >= '1' && e.key <= '9') {
        selectHotbar(parseInt(e.key) - 1);
      }
    });

    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // Остальной код Three.js, raycasting, socket и т.д. — оставлен почти таким же, как в предыдущей версии, но с добавлением renderAllBlocks() и updateMovement() в animate().

    // Пример animate loop (добавь/замени):
    function animate() {
      requestAnimationFrame(animate);
      if (document.getElementById('game-screen').style.display === 'block') {
        updateMovement();
        updateHand();
        socket.emit('player_move', { position: camera.position, rotation: camera.rotation });
      }
      renderer.render(scene, camera);
    }

    // При создании мира и join_world вызывай createHotbar() и renderAllBlocks()

    // Для списка миров:
    function showMultiplayer() {
      document.getElementById('menu-screen').style.display = 'none';
      document.getElementById('world-list-screen').style.display = 'flex';
      socket.emit('get_world_list');
    }

    socket.on('world_list', (list) => {
      const container = document.getElementById('world-list');
      container.innerHTML = '';
      list.forEach(w => {
        const btn = document.createElement('button');
        btn.textContent = `${w.name} (от ${w.owner})`;
        btn.onclick = () => {
          currentWorldId = w.id;
          document.getElementById('world-list-screen').style.display = 'none';
          document.getElementById('game-screen').style.display = 'block';
          socket.emit('join_world', { worldId: w.id });
          createHotbar();
        };
        container.appendChild(btn);
      });
      if (list.length === 0) container.innerHTML = '<p>Пока нет открытых миров. Создай первый в одиночной игре.</p>';
    });

    // При старте игры (в world_data):
    socket.on('world_data', (data) => {
      blocks = data.blocks;
      renderAllBlocks();
      createHotbar();
      // ... остальная инициализация three.js
      animate();
    });

    // Блок плейс/брейк — используй selectedBlockType вместо 'grass'
    // В onMouseDown:
    // ... при правом клике: socket.emit('block_update', { ..., type: selectedBlockType });

  </script>
</body>
</html>
